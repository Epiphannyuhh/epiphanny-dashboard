<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epiphanny Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

/* Reset */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;overflow-x:hidden;min-height:100vh;background:#fff;position:relative;}

/* Flowing Gradient Background */
body::before {
  content:'';
  position:fixed;top:0;left:0;width:100%;height:100%;
  background: radial-gradient(circle at 20% 20%, rgba(255,192,203,0.3), transparent 70%),
              radial-gradient(circle at 80% 40%, rgba(255,182,193,0.25), transparent 70%),
              radial-gradient(circle at 50% 80%, rgba(255,182,193,0.2), transparent 70%);
  background-size:200% 200%;
  animation: flowyBg 25s ease-in-out infinite;
  z-index:-5;
}
@keyframes flowyBg {0%{background-position:0% 0%,0% 0%,0% 0%;}50%{background-position:50% 50%,50% 50%,50% 50%;}100%{background-position:0% 0%,0% 0%,0% 0%;}}

/* Moving Pink Aura */
.aura{
  position:fixed;top:-50%; left:-50%; width:200%; height:200%;
  background:radial-gradient(circle at center, rgba(255,182,217,0.25), rgba(255,182,217,0));
  animation:auraMove 20s linear infinite;
  z-index:-4;
}
@keyframes auraMove{0%{transform:translate(0,0) rotate(0deg);}50%{transform:translate(20%,10%) rotate(180deg);}100%{transform:translate(0,0) rotate(360deg);}}

/* Glitter background particles */
.glitter{position:absolute;width:4px;height:4px;background:rgba(255,192,203,0.6);border-radius:50%;pointer-events:none;animation:glitterFloat linear infinite;}
@keyframes glitterFloat{0%{transform:translateY(0) scale(0.5);opacity:0.6}100%{transform:translateY(-120vh) scale(1);opacity:0;}}

/* Container */
.container{max-width:480px;margin:40px auto;padding:20px;}
.header{text-align:center;margin-bottom:25px;}
.logo{font-family:'Pacifico', cursive;font-size:50px;
      background: linear-gradient(135deg, #ffcce6, #ffe4f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke:1px #ffe4f0;
      text-shadow:2px 2px 6px rgba(255,182,193,0.5),0 0 15px rgba(255,192,203,0.2);}
.subtitle{display:none;}

/* Cards */
.card{border-radius:32px;padding:22px;margin-bottom:18px;position:relative;overflow:hidden;transition: transform 0.3s ease, box-shadow 0.3s ease;}
.cute-card{
  background: linear-gradient(135deg, #ffe4f1, #ffd6ec);
  border:1px solid #ffcce6;
  box-shadow: 0 10px 25px rgba(255,182,217,0.25);
  position:relative;overflow:hidden;
}
.cute-card:hover{transform:translateY(-6px) scale(1.03); box-shadow:0 12px 30px rgba(255,182,217,0.5);}
.cute-card::after{
  content:"";position:absolute;top:0;left:-50%;width:200%;height:100%;
  background:linear-gradient(120deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.3) 100%);
  transform:skewX(-20deg);animation: shimmer 3s infinite;
}
@keyframes shimmer{0%{left:-50%;}100%{left:150%;}}

.card-title{font-weight:600;color:#ff8fc4;margin-bottom:8px;}
.card-text{font-size:13px;color:#777;margin-bottom:14px;}

/* Buttons */
.btn{display:inline-block;padding:10px 22px;background:linear-gradient(135deg,#ffb6d9,#ffcce6);
    border-radius:999px;color:white;font-size:14px;text-decoration:none;
    box-shadow:0 6px 20px rgba(255,182,217,0.5);transition: transform 0.3s ease, box-shadow 0.3s ease;
    position:relative;overflow:hidden;}
.btn::after{
  content:"";position:absolute;top:0;left:-50%;width:200%;height:100%;
  background:linear-gradient(120deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.4) 100%);
  transform:skewX(-20deg);animation: shimmer 3s infinite;
}
.btn:hover{transform:scale(1.1) rotate(-2deg); box-shadow:0 8px 25px rgba(255,182,217,0.6);}

/* Floating hearts inside card */
.heart{position:absolute;font-size:16px;opacity:0.7;animation: floatHeart 5s linear infinite;}
.heart1{top:-10px; left:10px; animation-delay:0s;}
.heart2{top:-5px; right:15px; animation-delay:1.5s;}
.heart3{bottom:-10px; left:40%; animation-delay:3s;}
@keyframes floatHeart{0%{transform:translateY(0) scale(1); opacity:0.6;}50%{transform:translateY(-60px) scale(1.2); opacity:1;}100%{transform:translateY(0) scale(1); opacity:0.6;}}

/* Footer */
footer{text-align:center;font-size:11px;color:#aaa;margin-top:20px;}

/* Touch sparkle + heart */
.touch-sparkle,.touch-heart{position:absolute;width:12px;height:12px;border-radius:50%;pointer-events:none;animation:touchSpark 0.8s forwards;}
.touch-heart{width:14px;height:14px;transform:rotate(-45deg);}
@keyframes touchSpark{0%{opacity:1;transform:scale(0.5) rotate(0deg);}50%{opacity:1;transform:scale(1.5) rotate(180deg);}100%{opacity:0;transform:scale(0) rotate(360deg);}}
</style>
</head>
<body>

<div class="aura"></div>

<div class="background">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="bow">🎀</div>
</div>

<div class="container">
  <div class="header"><div class="logo">🌸 Epiphanny</div></div>

  <!-- Website Card -->
  <div class="card cute-card">
    <div class="card-title">Our Website</div>
    <div class="card-text">Check out our main beaming website ✨</div>
    <a href="https://url-link.cc/85-3rhQN" class="btn cute-btn" target="_blank">Open Website</a>
    <div class="heart heart1">💖</div>
    <div class="heart heart2">💖</div>
    <div class="heart heart3">💖</div>
  </div>

  <!-- Discord Card -->
  <div class="card cute-card">
    <div class="card-title">Join our Discord</div>
    <div class="card-text">Come hang out with Epiphanny's💖</div>
    <a href="https://discord.gg/epiphanny" class="btn cute-btn" target="_blank">Join Discord</a>
    <div class="heart heart1">💖</div>
    <div class="heart heart2">💖</div>
    <div class="heart heart3">💖</div>
  </div>

  <footer>Made with ♡ for Epiphanny's</footer>
</div>

<script>
// Interactive sparkle + heart + background glitter
document.addEventListener('pointermove', function(e){
  // Sparkle
  const sparkle = document.createElement('div');
  sparkle.classList.add('touch-sparkle');
  sparkle.style.left=(e.clientX-6)+'px';
  sparkle.style.top=(e.clientY-6)+'px';
  sparkle.style.background=`hsl(${Math.random()*360},80%,85%)`;
  document.body.appendChild(sparkle);
  setTimeout(()=>{sparkle.remove();},800);
  // Heart
  const heart = document.createElement('div');
  heart.classList.add('touch-heart');
  heart.style.left=(e.clientX-7)+'px';
  heart.style.top=(e.clientY-7)+'px';
  heart.style.background='pink';
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},800);
  // Random glitter particles
  for(let i=0;i<2;i++){
    const glitter=document.createElement('div');
    glitter.classList.add('glitter');
    glitter.style.left=Math.random()*window.innerWidth+'px';
    glitter.style.top=window.innerHeight+'px';
    glitter.style.animationDuration=(5+Math.random()*5)+'s';
    document.body.appendChild(glitter);
    setTimeout(()=>{glitter.remove();},10000);
  }
});
</script>

</body>
</html>

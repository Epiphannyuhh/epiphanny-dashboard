<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epiphanny Dashboard ✨</title>

<!-- Open Graph (Discord Preview Banner) -->
<meta property="og:title" content="Epiphanny ✨" />
<meta property="og:description" content="Cute magical pink sparkle dashboard 💖" />
<meta property="og:image" content="https://i.postimg.cc/JhRY0rKQ/4e02e6711987a53765fa074993175786.jpg" />
<meta property="og:url" content="https://ephipanny.netlify.app/" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#ffc0cb">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

/* Reset */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;overflow-x:hidden;min-height:100vh;background:#fff;position:relative;}

/* Flowing Gradient Background */
body::before {
  content:'';
  position:fixed;top:0;left:0;width:100%;height:100%;
  background: radial-gradient(circle at 20% 20%, rgba(255,192,203,0.3), transparent 70%),
              radial-gradient(circle at 80% 40%, rgba(255,182,193,0.25), transparent 70%),
              radial-gradient(circle at 50% 80%, rgba(255,182,193,0.2), transparent 70%);
  background-size:200% 200%;
  animation: flowyBg 25s ease-in-out infinite;
  z-index:-5;
}
@keyframes flowyBg {0%{background-position:0% 0%,0% 0%,0% 0%;}50%{background-position:50% 50%,50% 50%,50% 50%;}100%{background-position:0% 0%,0% 0%,0% 0%;}}

/* Aura */
.aura{
  position:fixed;top:-50%; left:-50%; width:200%; height:200%;
  background:radial-gradient(circle at center, rgba(255,182,217,0.25), rgba(255,182,217,0));
  animation:auraMove 20s linear infinite;
  z-index:-4;
}
@keyframes auraMove{
0%{transform:translate(0,0) rotate(0deg);}
50%{transform:translate(20%,10%) rotate(180deg);}
100%{transform:translate(0,0) rotate(360deg);}
}

/* Container */
.container{max-width:480px;margin:40px auto;padding:20px;}
.header{text-align:center;margin-bottom:25px;}
.logo{
  font-family:'Pacifico', cursive;
  font-size:50px;
  background: linear-gradient(135deg, #ffcce6, #ffe4f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  -webkit-text-stroke:1px #ffe4f0;
  text-shadow:2px 2px 6px rgba(255,182,193,0.5);
}

/* Cards */
.card{
  border-radius:32px;
  padding:22px;
  margin-bottom:18px;
  background: linear-gradient(135deg, #ffe4f1, #ffd6ec);
  border:1px solid #ffcce6;
  box-shadow: 0 10px 25px rgba(255,182,217,0.25);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 12px 30px rgba(255,182,217,0.5);
}
.card-title{font-weight:600;color:#ff8fc4;margin-bottom:8px;}
.card-text{font-size:13px;color:#777;margin-bottom:14px;}

/* Buttons */
.btn{
  display:inline-block;
  padding:10px 22px;
  background:linear-gradient(135deg,#ffb6d9,#ffcce6);
  border-radius:999px;
  color:white;
  font-size:14px;
  text-decoration:none;
  box-shadow:0 6px 20px rgba(255,182,217,0.5);
  transition: transform 0.3s ease;
}
.btn:hover{
  transform:scale(1.1);
}

/* Footer */
footer{text-align:center;font-size:11px;color:#aaa;margin-top:20px;}
</style>
</head>

<body>

<div class="aura"></div>

<div class="container">
  <div class="header">
    <div class="logo">🌸 Epiphanny</div>
  </div>

  <div class="card">
    <div class="card-title">Our Website</div>
    <div class="card-text">Check out our main beaming website ✨</div>
    <a href="https://url-link.cc/85-3rhQN" class="btn" target="_blank">Open Website</a>
  </div>

  <div class="card">
    <div class="card-title">Join our Discord</div>
    <div class="card-text">Come hang out with Epiphanny's 💖</div>
    <a href="https://discord.gg/epiphanny" class="btn" target="_blank">Join Discord</a>
  </div>

  <footer>Made with ♡ for Epiphanny's</footer>
</div>

</body>
  </html>
